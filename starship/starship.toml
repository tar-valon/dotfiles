format = """
[в•ӯв”Җ](238)[в–“](fg:#303030)\
$os\
[в”Ӯ](bg:#303030 fg:#565859)\
$directory\
[в”Ӯ](bg:#303030 fg:#565859)\
$git_branch\
$git_status\
$docker_context\
[в–“ ](fg:#303030)\
 $fill \
[в–“](fg:#303030)\
$cmd_duration\
$time\
$python\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
[в–“ ](fg:#303030)
[в•°в”Җ](238) 
"""

command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false

[cmd_duration]
min_time = 500
style = "bg:#303030 fg:#87875f"
format = '[ took $duration пү’ ]($style)[в”Ӯ](bg:#303030 fg:#565859)'
#
# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "bg:#303030"
style_root = "bg:#303030"
format = '[$user ]($style)'

[directory]
style = "bg:#303030 fg:#00b2ff"
format = "[ пҒј ](bg:#303030 fg:#0087af)[$path ]($style)[$read_only]($read_only_style)"
truncation_length = 3
# truncation_symbol = "вҖҰ/"
read_only = ' пҖЈ '
read_only_style = "bg:#303030 fg:#F15156"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "пңҳ"
"Downloads" = "пҖҷ"
"Music" = "пҖҒ"
"Pictures" = "пҖҫ"
"Videos" = "пҖҪ"
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[aws]
symbol = "оҢҪ  "
style = '#30d5c8'
format = '[$symbol](style)'

[c]
symbol = "оҳһ "
style = "bg:#303030"
format = '[ $symbol ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#303030"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = "оүө "
style = "bg:#303030"
format = '[ $symbol ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:#303030"
format = '[ $symbol ]($style)'

[fill]
symbol = ' '
style = '(238)'

[git_branch]
symbol = 'пҗҳ '
style = "bg:#303030 fg:#5bc706"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#303030 fg:#5bc706"
conflicted = 'рҹҸі'
up_to_date = 'вң“'
untracked = 'п”© '
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
stashed = 'пЈ– '
modified = 'пҒ„ '
staged = '++\($count\)'
renamed = 'иҘҒ '
deleted = 'пҖ” '
format = '[ $all_status$ahead_behind ]($style)[в”Ӯ](bg:#303030 fg:#565859)'

[golang]
symbol = "оҳ§ "
style = "bg:#303030"
format = '[ $symbol ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:#303030 fg:#5e5086"
format = '[ $symbol ]($style)'

[java]
symbol = "оү– "
style = "bg:#303030 fg:#ed8b00"
format = '[ $symbol ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:#303030"
format = '[ $symbol ]($style)'

[lua]
symbol = "оҳ  "
style = "bg:#303030"
format = '[$symbol](style)'

[memory_usage]
symbol = "у°Қӣ "

[nodejs]
symbol = "оңҳ"
style = "bg:#303030"
format = '[ $symbol ]($style)'

[nim]
symbol = "пҡӨ "
style = "bg:#303030"
format = '[ $symbol ]($style)'

[os]
style = "bg:#303030"
format = '[ $symbol ]($style)'   
disabled = false

[os.symbols]
Fedora = 'пҢҠ'
Arch = 'у°ЈҮ'
Ubuntu = 'пҢӣ'

[package]
symbol = "у°Ҹ— "

[python]
symbol = 'оҲө '
style = "bg:#303030 fg:#00AFAF"
format = '[ $symbol](bg:#303030 fg:#fed142)[$virtualenv]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#303030"
format = '[ $symbol ]($style)'

[time]
disabled = false
time_format = "%T" # Hour:Minute Format
style = "bg:#303030 fg:#5f8787"
format = '[ $time пҖ— ]($style)[в”Ӯ](bg:#303030 fg:#565859)'

