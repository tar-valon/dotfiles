style = "bg:#303030 fg:#EC89CB"
format = '[ took $duration ï‰’ ]($style)[â§¸](bg:#303030 fg:#565859)'
#
# You can also replace your username with a neat symbol like ï„  to save some space
[username]
show_always = true
style_user = "bg:#303030"
style_root = "bg:#303030"
format = '[$user ]($style)'

[directory]
style = "bg:#303030 fg:#60ADEC"
format = "[ ïپ¼ ](bg:#303030 fg:#0087af)[$path ]($style)[$read_only]($read_only_style)"
truncation_length = 3
# truncation_symbol = "â€¦/"
read_only = ' ï€£ '
read_only_style = "bg:#303030 fg:#F15156"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "ïœک"
"Downloads" = "ï€™"
"Music" = "ï€پ"
